# Dataset
ds_rate: 1
dataset_name: 'pku-mmd'
train_vids_file: 'Datasets/PKU-view/splits/train.split1.bundle'
test_vids_file: 'Datasets/PKU-view/splits/test.split1.bundle'
channel: 12
num_classes: 52
gt_path: 'Datasets/PKU-view/gt_arr/'
gt_bound_path: 'Datasets/PKU-view/gt_boundary_arr/'
feature_path: 'Datasets/PKU-view/features/'
joint_num: 25
feature_type: 'new'
segment_num: 64

# hyper
learning_rate: 0.0005
period_epoch: 1
num_epochs: 60
batch_size: 2

# Spatial
feat_dim: 52
spatial_dil: [32,32,32,32,16,32,64,128,256,512]
graph_layout: 'pku-mmd'
graph_strategy: 'spatial'
spatial_filters: 64
edge_importance_weighting: True

# Temporal
num_stages: 4
num_f_maps: 64
num_layers: 5
temporal_dil: [32,32,32,32,16,32,64,128,256,512]


